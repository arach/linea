name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The @arach/ora dependency points to a local sibling dir that
      # doesn't exist in CI.  Vite aliases it to src/lib/ora-browser.ts
      # at build time, so we just need bun install to succeed.
      - name: Stub @arach/ora for CI
        run: |
          mkdir -p ../ora
          echo '{"name":"@arach/ora","version":"0.0.0","main":"index.js"}' > ../ora/package.json
          echo 'module.exports = {};' > ../ora/index.js

      - run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build:static

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
