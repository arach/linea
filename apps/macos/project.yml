name: LineaMac
options:
  bundleIdPrefix: com.uselinea
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
targets:
  LineaMacApp:
    type: application
    platform: macOS
    sources:
      - LineaMac
    settings:
      PRODUCT_NAME: Linea
      PRODUCT_MODULE_NAME: LineaMacApp
      PRODUCT_BUNDLE_IDENTIFIER: com.uselinea.mac
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Linea
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      MACOSX_DEPLOYMENT_TARGET: "15.0"
